<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dito</title>
    <meta name="description" content="Venda seus cursos, ebooks e micro SaaS na plataforma mais rápida do Brasil.">
    <meta name="theme-color" content="#ff005c">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="D2.png">
    <link rel="apple-touch-icon" href="D2.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Lógica PWA Persistente
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        async function installPWA() {
            if (deferredPrompt) {
                console.log('Disparando instalação...');
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
            } else {
                const isStandalone = window.matchMedia('(display-mode: standalone)').matches || (window.navigator as any).standalone;
                if (isStandalone) {
                    alert('O Dito já está instalado em seu dispositivo!');
                    return;
                }

                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !(window as any).MSStream;
                if (isIOS) {
                    alert('No iPhone: Toque no ícone de Compartilhar (quadrado com seta) e escolha "Adicionar à Tela de Início".');
                } else {
                    if (confirm('Deseja instalar o Dito agora? Clique em OK para ver como fazer manualmente caso a janela não abra.')) {
                        alert('Para baixar: Use o menu do navegador (3 pontinhos ou seta no topo) e escolha "Instalar Aplicativo" ou "Adicionar à tela inicial".');
                    }
                }
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</head>
<body>
    <!-- Definição Global de Gradiente para Ícones -->
    <svg width="0" height="0" style="position: absolute;">
      <linearGradient id="dito-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#ff005c;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#0487ff;stop-opacity:1" />
      </linearGradient>
    </svg>

    <!-- Splash Screen Premium -->
    <div id="splash-screen" style="position: fixed; inset: 0; background: linear-gradient(135deg, #ff005c 0%, #0487ff 100%); z-index: 99999; display: flex; align-items: center; justify-content: center; transition: 0.8s;">
        <img src="D.png" style="width: 180px; height: 180px; object-fit: contain;">
    </div>


    <div id="app" class="app-container">
        <!-- Renderização Dinâmica via JS -->
    </div>
    
    <!-- Container de Notificações Centralizado -->
    <div id="notification-container" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10000; display: flex; flex-direction: column; align-items: center; width: 100%; pointer-events: none;"></div>

    <nav id="global-nav" style="position: fixed; bottom: 44px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; height: 74px; display: none; justify-content: space-around; align-items: center; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border: 1px solid #eee; border-radius: 44px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 0 20px; z-index: 1000;">
        <div class="nav-item" data-view="dashboard" onclick="app.navigate('dashboard')">
            <i data-lucide="home" style="width: 26px; height: 26px;"></i>
        </div>
        <div class="nav-item" data-view="mercado" onclick="app.navigate('mercado')" style="position: relative;">
            <i data-lucide="store" style="width: 26px; height: 26px;"></i>
            <div id="dot-mercado" class="notif-dot" style="position: absolute; top: -2px; right: -2px; display: none;"></div>
        </div>
        <div class="nav-item" data-view="sacar" onclick="app.navigate('sacar')">
            <i data-lucide="wallet" style="width: 26px; height: 26px;"></i>
        </div>
        <div class="nav-item" data-view="perfil" onclick="app.navigate('perfil')">
            <i data-lucide="user" style="width: 26px; height: 26px;"></i>
        </div>
    </nav>

    <!-- Botão Baixar App Abaixo (Simples com Degradê) -->
    <div id="download-app-link" style="position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 1000; display: none;">
        <span style="font-size: 11px; font-weight: 900; background: linear-gradient(90deg, #ff005c 0%, #0487ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.2px; cursor: pointer; display: inline-block; transition: 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" onclick="installPWA()">Baixar App Dito</span>
    </div>

    <!-- Templates Section -->
    <template id="template-login">
        <div class="login-screen animate-fade" style="align-items: center; text-align: center;">
            <div class="login-header">
                <img src="D2.png" alt="Dito Logo" style="width: 80px; height: 80px; border-radius: 24px; margin: 0 auto 16px; display: block; object-fit: cover;">
                <h1 style="background: linear-gradient(90deg, #ff005c 0%, #0487ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; letter-spacing: -2px; display: inline-block;">Dito</h1>
            </div>
            
            <div style="width: 100%; max-width: 360px;">
                <div class="form-group" style="margin-bottom: 20px;">
                    <div style="position: relative;">
                        <i data-lucide="user" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); width: 20px;"></i>
                        <input type="text" id="username" placeholder="Nome de usuário" style="padding: 18px 18px 18px 54px; border-radius: 50px; background: var(--surface); border: 1px solid var(--border); width: 100%;">
                    </div>
                </div>
                
                <div class="form-group" style="margin-bottom: 30px;">
                    <div style="position: relative;">

                        <input type="password" id="password" placeholder="Senha" style="padding: 18px 18px 18px 54px; border-radius: 50px; background: var(--surface); border: 1px solid var(--border); width: 100%;">
                        <i data-lucide="eye-off" id="toggle-password" onclick="app.togglePassword()" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); width: 20px; cursor: pointer;"></i>
                    </div>
                </div>
                
                <button class="btn btn-primary" style="height: 60px; border-radius: 50px; width: 100%; font-size: 18px;" onclick="app.login()">
                    <i data-lucide="log-in" style="width: 20px;"></i> Entrar
                </button>
                
                <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 12px; width: 100%;">
                    <button class="btn btn-secondary" style="height: 56px; border-radius: 50px; font-size: 14px; width: 100%;" onclick="app.navigate('cadastro')">
                        <i data-lucide="user-plus" style="width: 20px;"></i> Cadastre-se
                    </button>
                    <button class="btn btn-secondary" style="height: 56px; border-radius: 50px; font-size: 14px; width: 100%;" onclick="app.login(true)">
                        <i data-lucide="ghost" style="width: 20px;"></i> Entrar como convidado
                    </button>
                </div>
            </div>
            
            <div style="margin-top: 40px; padding-top: 24px; border-top: 1px solid #f9f9f9;">
                <button class="clickable" onclick="installPWA()" style="background: transparent; border: none; font-size: 11px; font-weight: 800; color: #ccc; display: flex; align-items: center; gap: 8px; margin: 0 auto;">
                    <i data-lucide="download" style="width: 14px;"></i>
                    Baixar App Dito
                </button>
            </div>
        </div>
    </template>

    <template id="template-cadastro">
        <div class="login-screen animate-fade" style="align-items: center; text-align: center;">
            <div onclick="app.navigate('login')" style="position: absolute; top: 40px; left: 24px; cursor: pointer; color: #ccc;">

            </div>
            <div class="login-header">

                <p style="color: #ef4444; font-weight: 900; font-size: 14px; margin-bottom: 4px;">Dito</p>
                <h1 style="font-size: 28px; font-weight: 900;">Criar conta</h1>
                <p>Junte-se a nós.</p>
            </div>
            
            <div style="width: 100%; max-width: 360px;">
                <div class="form-group" style="margin-bottom: 20px;">
                    <div style="position: relative;">
                        <i data-lucide="user" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); width: 20px;"></i>
                        <input type="text" id="reg-username" placeholder="Crie seu nome de usuário" style="padding: 18px 18px 18px 54px; border-radius: 50px; background: var(--surface); border: 1px solid var(--border); width: 100%;">
                    </div>

                <div class="form-group" style="margin-bottom: 30px;">

                    </div>
                </div>

                    <i data-lucide="user-plus"></i> Finalizar cadastro
                </button>
            </div>
        </div>
    </template>

    <template id="template-dashboard">
        <nav style="padding: 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #fff; z-index: 100;">
            <div id="nav-create-btn" style="position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'" onclick="app.navigate('criar-produto'); app.initCreateProduct();">

            </div>
            <div id="nav-logo" style="position: absolute; left: 50%; transform: translateX(-50%); font-size: 24px; font-weight: 900; letter-spacing: -1.5px; text-transform: capitalize;">Dito</div>
            <div style="display: flex; gap: 12px; align-items: center; justify-content: flex-end; flex: 1;" id="nav-actions">

                <div id="search-container" style="display: flex; align-items: center; background: #f5f5f5; border-radius: 50px; width: 40px; height: 40px; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); overflow: visible; position: relative; z-index: 1000;">

                    <input type="text" id="social-search-input" placeholder="Buscar perfis..." oninput="app.searchUsers(this.value)" style="border: none; background: transparent; outline: none; padding: 0; width: 0; opacity: 0; font-weight: 800; font-size: 13px; transition: all 0.5s ease;">
                    <i data-lucide="x" id="search-close" style="width: 16px; color: #999; margin-right: 12px; display: none; cursor: pointer;" onclick="app.toggleSocialSearch(false, event)"></i>
                    
                    <!-- Dropdown de Resultados Social -->
                    <div id="social-search-results" style="display: none; position: absolute; top: 50px; right: 0; width: 280px; background: #fff; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border: 1px solid #f0f0f0; overflow: hidden; animation: slideDown 0.3s ease;">
                        <!-- Injetado via JS -->
                    </div>
                </div>
            </div>
        </nav>
        <div class="dashboard animate-fade" style="padding: 0;">

            <!-- Minimalist Balance Section -->
            <section style="background: #fff; color: #000; padding: 32px 24px; margin-bottom: 12px; text-align: center; border-bottom: 1px solid #f9f9f9;">
                <p style="font-size: 9px; font-weight: 900; letter-spacing: 2px; color: #eee; margin-bottom: 12px;">Saldo total</p>
                <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px;">
                    <h2 id="label-balance" style="font-size: 32px; font-weight: 900; letter-spacing: -1.5px;">
                        R$ 0,00
                    </h2>
                    <i data-lucide="eye" id="toggle-balance" onclick="app.toggleBalance()" style="width: 18px; height: 18px; cursor: pointer; color: #000;"></i>
                </div>
            </section>

            <div style="padding: 0 24px 32px;">
                <p style="color: #999; font-size: 15px; font-weight: 800;">Oii, <span id="user-greeting-name" style="color: #000;">benedito</span></p>
            </div>

            <!-- Quick Actions Grid -->
            <!-- Quick Actions Horizontal Scroll -->
            <section class="hide-scrollbar" style="display: flex; gap: 32px; overflow-x: auto; padding: 10px 24px 30px; margin-bottom: 24px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scroll-padding-left: 24px;">
                
                <!-- BOTÃO CRIAR PRODUTO -->
                <div class="clickable" style="scroll-snap-align: start; flex-shrink: 0; text-align: center;" onclick="app.navigate('criar-produto'); app.initCreateProduct();">
                    <div style="width: 56px; height: 56px; background: var(--surface); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                        <i data-lucide="plus" style="width: 22px;"></i>
                    </div>
                    <span style="font-size: 10px; font-weight: 900; color: var(--text-secondary); letter-spacing: -0.2px; white-space: nowrap;">Criar produto</span>
                </div>

                <div class="clickable" style="scroll-snap-align: start; flex-shrink: 0; text-align: center;" onclick="app.navigate('vendas')">
                    <div style="width: 56px; height: 56px; background: var(--surface); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                        <i data-lucide="trending-up" style="width: 22px;"></i>
                    </div>
                    <span style="font-size: 10px; font-weight: 900; color: var(--text-secondary); letter-spacing: -0.2px;">Vendas</span>
                </div>

                <div class="clickable" style="scroll-snap-align: start; flex-shrink: 0; text-align: center;" onclick="app.navigate('links')">
                    <div style="width: 56px; height: 56px; background: var(--surface); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                        <i data-lucide="link" style="width: 22px;"></i>
                    </div>
                    <span style="font-size: 10px; font-weight: 900; color: var(--text-secondary); letter-spacing: -0.2px;">Links</span>
                </div>

                <div class="clickable" style="scroll-snap-align: start; flex-shrink: 0; text-align: center;" onclick="app.navigate('produtos')">
                    <div style="width: 56px; height: 56px; background: var(--surface); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                        <i data-lucide="package" style="width: 22px;"></i>
                    </div>
                    <span style="font-size: 10px; font-weight: 900; color: var(--text-secondary); letter-spacing: -0.2px; white-space: nowrap;">Meus produtos</span>
                </div>

                <div onclick="app.navigate('sociedade')" class="clickable" style="scroll-snap-align: start; flex-shrink: 0; text-align: center;">

                        <span id="dot-sociedade" style="display: none; position: absolute; top: -2px; right: -2px; width: 16px; height: 16px; background: #ef4444; border-radius: 50%; border: 2px solid #fff; shadow: 0 4px 10px rgba(0,0,0,0.1);"></span>
                    </div>
                    <span style="font-size: 10px; font-weight: 900; color: var(--text-secondary); letter-spacing: -0.2px;">Sociedade</span>
                </div>

                <div onclick="app.navigate('meus-cursos')" class="clickable" style="scroll-snap-align: start; flex-shrink: 0; text-align: center;">
                    <div style="width: 56px; height: 56px; background: var(--surface); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">

                    </div>
                    <span style="font-size: 10px; font-weight: 900; color: var(--text-secondary); letter-spacing: -0.2px; white-space: nowrap;">Meus cursos</span>
                </div>

                <div onclick="app.navigate('hall')" class="clickable" style="scroll-snap-align: start; flex-shrink: 0; text-align: center;">
                    <div style="width: 56px; height: 56px; background: var(--surface); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">

                    </div>
                    <span style="font-size: 10px; font-weight: 900; color: var(--text-secondary); letter-spacing: -0.2px; white-space: nowrap;">Hall da fama</span>
                </div>
            </section>

            <div style="margin-top: 40px; padding-top: 24px; border-top: 1px solid #f9f9f9; text-align: center;">
                <button class="clickable" onclick="installPWA()" style="background: transparent; border: none; font-size: 11px; font-weight: 900; color: #ccc; display: flex; align-items: center; gap: 8px; margin: 0 auto;">
                    <i data-lucide="download" style="width: 14px;"></i>
                    Baixar App Dito
                </button>
            </div>
        </div>
    </template>

    <template id="template-sociedade">
        <div style="padding: 24px; padding-bottom: 120px;">
            <header style="margin-bottom: 32px;">
                <h1 style="font-size: 34px; font-weight: 900; letter-spacing: -1.5px; display: flex; align-items: center; gap: 12px;">
                    <i data-lucide="users" style="width: 32px;"></i> Sociedade
                </h1>
                <p style="color: var(--text-secondary); font-size: 13px; font-weight: 700; margin-top: 4px;">Junte-se a pessoas como você.</p>
                
                <div style="margin-top: 24px;">
                    <button onclick="app.toggleCreateSocietyModal(true)" style="width: 100%; height: 56px; background: #000; color: #fff; border: none; border-radius: 28px; font-size: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                        <i data-lucide="plus" style="width: 18px;"></i> Criar Sociedade
                    </button>
                </div>
            </header>

            <div style="position: relative; margin-bottom: 32px;">
                <i data-lucide="search" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #ccc; width: 20px;"></i>
                <input type="text" placeholder="Buscar comunidades..." style="width: 100%; height: 60px; background: var(--surface); border: 1px solid var(--border); border-radius: 30px; padding-left: 54px; font-size: 14px; font-weight: 700;">
            </div>

            <div id="societies-list" style="display: flex; flex-direction: column; gap: 20px;">
                <!-- Conteúdo Dinâmico -->
            </div>

            <div id="create-society-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 10001; align-items: flex-end; justify-content: center; padding: 16px;">
                <div style="background: #fff; width: 100%; max-width: 450px; border-radius: 40px; padding: 32px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
                        <h2 style="font-size: 24px; font-weight: 900; letter-spacing: -1px;">Criar sociedade</h2>
                        <button onclick="app.toggleCreateSocietyModal(false)" style="background: var(--surface); border: none; padding: 8px; border-radius: 50%; cursor: pointer;">
                            <i data-lucide="x" style="width: 20px;"></i>
                        </button>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 16px;">
                        <input id="new-soc-name" type="text" placeholder="Nome da comunidade" style="width: 100%; height: 56px; background: var(--surface); border: 1px solid var(--border); border-radius: 28px; padding: 0 20px; font-size: 14px; font-weight: 700;">
                        <input id="new-soc-fee" type="number" placeholder="Valor de entrada (R$)" style="width: 100%; height: 56px; background: var(--surface); border: 1px solid var(--border); border-radius: 28px; padding: 0 20px; font-size: 14px; font-weight: 700;">
                        <p style="font-size: 11px; font-weight: 700; color: #856404; background: #fff9f0; padding: 12px; border-radius: 12px;">Taxa única de R$ 15,00 será cobrada do seu saldo.</p>
                        <button onclick="app.createSociety()" style="width: 100%; height: 60px; background: #000; color: #fff; border: none; border-radius: 30px; font-size: 16px; font-weight: 900; cursor: pointer;">Criar produto</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Removido template vazio fantasma -->
    <!-- Removido duplicata antiga para evitar conflito -->

    <template id="template-mercado-produto">
        <div style="background: #fff; padding-bottom: 120px;">
            <div style="height: 300px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; position: relative;">
                <button onclick="app.setMarketView('home')" style="position: absolute; top: 20px; left: 24px; width: 40px; height: 40px; border-radius: 50%; background: #fff; border: none; shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer;"><i data-lucide="arrow-left" style="width: 18px;"></i></button>
                <i data-lucide="shopping-bag" style="width: 80px; color: #eee;"></i>
            </div>
            <div style="padding: 24px;">
                <div id="product-detail-content"></div>
                <button onclick="app.addToCartFromDetail()" style="width: 100%; height: 60px; background: #000; color: #fff; border: none; border-radius: 30px; font-weight: 900; margin-top: 32px;">ADICIONAR AO CARRINHO</button>
            </div>
        </div>
    </template>

    <template id="template-mercado-carrinho">
        <div style="padding: 24px; background: #fff; min-height: 100vh;">
            <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 32px;">

                            <p id="public-fans-count" style="font-weight: 900; font-size: 16px;">0</p>
                            <p style="font-size: 10px; font-weight: 800; color: #ccc; text-transform: uppercase;">Fãs</p>
                        </div>
                        <div>
                            <p id="public-vendas-count" style="font-weight: 900; font-size: 16px;">0</p>
                            <p style="font-size: 10px; font-weight: 800; color: #ccc; text-transform: uppercase;">Vendas</p>
                        </div>
                    </div>
                </div>

                <div style="margin-bottom: 24px;">
                    <h2 id="public-name" style="font-size: 14px; font-weight: 900; margin-bottom: 4px;">...</h2>
                    <p id="public-bio" style="font-size: 13px; font-weight: 500; color: #555; line-height: 1.4;"></p>
                    <a id="public-link" href="#" style="font-size: 13px; font-weight: 800; color: #00376b; text-decoration: none; margin-top: 4px; display: block;"></a>
                </div>

                <div style="display: flex; gap: 8px; margin-bottom: 32px;">
                    <button id="btn-fan" onclick="app.toggleFan()" style="flex: 1; height: 44px; border-radius: 12px; border: none; background: #000; color: #fff; font-weight: 900; font-size: 13px; cursor: pointer; transition: 0.3s;">Tornar-se Fã</button>
                    <button onclick="app.showNotification('Recurso de chat em breve na elite!')" style="flex: 1; height: 44px; border-radius: 12px; border: 1px solid #ddd; background: #fff; color: #000; font-weight: 900; font-size: 13px; cursor: pointer;">Mensagem</button>
                </div>
            </div>

            <div style="border-top: 1px solid #eee; padding-top: 2px;">
                <div id="public-posts-grid" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px;">
                    <!-- Posts injetados -->
                </div>
            </div>
        </div>
    </template>

    <div id="modal-container" class="modal-overlay" onclick="app.closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="app.js"></script>
</body>
</html>
