<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dito | Micro SaaS Infoprodutos</title>
    <meta name="description" content="Venda seus cursos, ebooks e micro SaaS na plataforma mais rápida do Brasil.">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app" class="app-container">
        <!-- Renderização Dinâmica via JS -->
    </div>
    
    <!-- Container de Notificações -->
    <div id="notification-container" class="notification-container"></div>

    <nav id="global-nav" style="position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; height: 74px; display: none; justify-content: space-around; align-items: center; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border: 1px solid #eee; border-radius: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 0 20px; z-index: 1000;">
        <div class="nav-item" data-view="dashboard" style="color: #ccc; cursor: pointer;" onclick="app.navigate('dashboard')">
            <i data-lucide="home" style="width: 26px; height: 26px;"></i>
        </div>
        <div class="nav-item" data-view="mercado" style="color: #ccc; cursor: pointer;" onclick="app.navigate('mercado')">
            <i data-lucide="store" style="width: 26px; height: 26px;"></i>
        </div>
        <div class="nav-item" data-view="sociedade" style="color: #ccc; cursor: pointer;" onclick="app.navigate('sociedade')">
            <i data-lucide="users" style="width: 26px; height: 26px;"></i>
        </div>
        <div class="nav-item" data-view="produtos" style="color: #ccc; cursor: pointer;" onclick="app.navigate('produtos')">
            <i data-lucide="package" style="width: 26px; height: 26px;"></i>
        </div>
        <div class="nav-item" data-view="links" style="color: #ccc; cursor: pointer;" onclick="app.navigate('links')">
            <i data-lucide="link" style="width: 26px; height: 26px;"></i>
        </div>
        <div class="nav-item" data-view="sacar" style="color: #ccc; cursor: pointer;" onclick="app.navigate('sacar')">
            <i data-lucide="wallet" style="width: 26px; height: 26px;"></i>
        </div>
        <div class="nav-item" data-view="perfil" style="color: #ccc; cursor: pointer;" onclick="app.navigate('perfil')">
            <i data-lucide="user" style="width: 26px; height: 26px;"></i>
        </div>
    </nav>

    <!-- Templates Section -->
    <template id="template-login">
        <div class="login-screen animate-fade" style="align-items: center; justify-content: center; text-align: center;">
            <div class="login-header">
                <div style="width: 80px; height: 80px; background: #000; border-radius: 24px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 40px; font-weight: 800; margin: 0 auto 24px;">D</div>
                <h1>Dito</h1>
            </div>
            
            <div style="width: 100%; max-width: 360px;">
                <div class="form-group" style="margin-bottom: 20px;">
                    <div style="position: relative;">
                        <i data-lucide="user" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); width: 20px;"></i>
                        <input type="text" id="username" placeholder="Nome de Usuário" style="padding: 18px 18px 18px 54px; border-radius: 50px; background: var(--surface); border: 1px solid var(--border); width: 100%;">
                    </div>
                </div>
                
                <div class="form-group" style="margin-bottom: 30px;">
                    <div style="position: relative;">
                        <i data-lucide="key" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); width: 20px;"></i>
                        <input type="password" id="password" placeholder="Senha" style="padding: 18px 18px 18px 54px; border-radius: 50px; background: var(--surface); border: 1px solid var(--border); width: 100%;">
                        <i data-lucide="eye" id="toggle-password" onclick="app.togglePassword()" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); width: 20px; cursor: pointer;"></i>
                    </div>
                </div>
                
                <button class="btn btn-primary" style="height: 60px; border-radius: 50px; width: 100%; font-size: 18px;" onclick="app.login()">Entrar na conta</button>
                
                <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 12px; width: 100%;">
                    <button class="btn btn-secondary" style="height: 56px; border-radius: 50px; font-size: 14px; width: 100%;" onclick="app.navigate('cadastro')">
                        <i data-lucide="user"></i> Cadastre-se
                    </button>
                    <button class="btn btn-secondary" style="height: 56px; border-radius: 50px; font-size: 14px; width: 100%;" onclick="app.login()">
                        <i data-lucide="ghost"></i> Entrar como convidado
                    </button>
                </div>
            </div>
        </div>
    </template>

    <template id="template-cadastro">
        <div class="login-screen animate-fade" style="align-items: center; justify-content: center; text-align: center;">
            <div onclick="app.navigate('login')" style="position: absolute; top: 40px; left: 24px; cursor: pointer; color: #ccc;">
                <i data-lucide="arrow-left" style="width: 24px;"></i>
            </div>
            <div class="login-header">
                <div style="width: 60px; height: 60px; background: #000; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 30px; font-weight: 800; margin: 0 auto 24px;">D</div>
                <h1 style="font-size: 28px;">Criar Conta</h1>
                <p>Junte-se a nós.</p>
            </div>
            
            <div style="width: 100%; max-width: 360px;">
                <div class="form-group" style="margin-bottom: 20px;">
                    <div style="position: relative;">
                        <i data-lucide="user" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); width: 20px;"></i>
                        <input type="text" id="reg-username" placeholder="Crie seu Nome de Usuário" style="padding: 18px 18px 18px 54px; border-radius: 50px; background: var(--surface); border: 1px solid var(--border); width: 100%;">
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 30px;">
                    <div style="position: relative;">
                        <i data-lucide="key" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); width: 20px;"></i>
                        <input type="password" id="reg-password" placeholder="Crie sua Senha" style="padding: 18px 18px 18px 54px; border-radius: 50px; background: var(--surface); border: 1px solid var(--border); width: 100%;">
                    </div>
                </div>
                
                <button class="btn btn-primary" style="height: 60px; border-radius: 50px; width: 100%; font-size: 18px;" onclick="app.registerUser()">Finalizar Cadastro</button>
            </div>
        </div>
    </template>

    <template id="template-dashboard">
        <nav style="padding: 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #fff; z-index: 100;">
            <div id="nav-create-btn" style="position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'" onclick="app.navigate('criar-produto'); app.initCreateProduct();">
                <i data-lucide="plus" style="width: 26px; height: 26px; stroke-width: 1.5px;"></i>
            </div>
            <div id="nav-logo" style="position: absolute; left: 50%; transform: translateX(-50%); font-size: 24px; font-weight: 900; letter-spacing: -1.5px; text-transform: capitalize;">Dito</div>
            <div style="display: flex; gap: 12px; align-items: center; justify-content: flex-end; flex: 1;" id="nav-actions">
                <i data-lucide="log-out" id="nav-logout" onclick="app.logout()" style="width: 22px; color: #ccc; cursor: pointer;"></i>
                <div id="search-container" style="display: flex; align-items: center; background: #f5f5f5; border-radius: 50px; width: 40px; height: 40px; transition: all 0.5s ease; overflow: hidden; position: relative; z-index: 20;">
                    <i data-lucide="search" id="search-icon" onclick="app.toggleSearch(true)" style="width: 22px; color: #ccc; margin-left: 9px; flex-shrink: 0; cursor: pointer;"></i>
                    <input type="text" id="search-input" placeholder="Pesquisar..." style="border: none; background: transparent; outline: none; padding: 0 16px; width: 0; opacity: 0; font-weight: 800; font-size: 13px; transition: all 0.5s ease;">
                    <i data-lucide="x" id="search-close" style="width: 18px; color: #999; margin-right: 12px; display: none; cursor: pointer;" onclick="app.toggleSearch(false, event)"></i>
                </div>
            </div>
        </nav>
        <div class="dashboard animate-fade" style="padding: 20px 24px;">
            <header style="margin-bottom: 32px; text-align: center;">
                <p style="color: var(--text-secondary); font-size: 14px;">Oii, <span id="user-greeting-name">benedito</span></p>
            </header>

            <!-- Big Black Balance Box -->
            <section style="background: #000; color: #fff; padding: 30px 40px; border-radius: 35px; margin-bottom: 32px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); position: relative;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; opacity: 0.5; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;">
                    <span>Saldo Total</span>
                    <i data-lucide="eye" id="toggle-balance" onclick="app.toggleBalance()" style="width: 18px; cursor: pointer;"></i>
                </div>
                <div id="balance-value" style="font-size: 32px; font-weight: 900; letter-spacing: -1px; transition: 0.3s;">
                    R$ 12.450,00
                </div>
            </section>

            <!-- Quick Actions Grid -->
            <section style="display: flex; justify-content: center; gap: 40px; margin-bottom: 48px; text-align: center;">
                <div class="clickable">
                    <div style="width: 64px; height: 64px; background: var(--surface); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;">
                        <i data-lucide="trending-up" style="width: 24px;"></i>
                    </div>
                    <span style="font-size: 10px; font-weight: 800; color: var(--text-secondary);">Vendas</span>
                </div>
                <div onclick="app.navigate('sociedade')" class="clickable">
                    <div style="width: 64px; height: 64px; background: var(--surface); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;">
                        <i data-lucide="users" style="width: 24px;"></i>
                    </div>
                    <span style="font-size: 10px; font-weight: 800; color: var(--text-secondary);">Sociedade</span>
                </div>
                <div onclick="app.navigate('hall')" class="clickable">
                    <div style="width: 64px; height: 64px; background: var(--surface); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;">
                        <i data-lucide="star" style="width: 24px;"></i>
                    </div>
                    <span style="font-size: 10px; font-weight: 800; color: var(--text-secondary);">Hall da fama</span>
                </div>
            </section>
        </div>

        </nav>
    </template>

    <template id="template-sociedade">
        <div style="padding: 24px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <div onclick="app.navigate('dashboard')" style="display: flex; align-items: center; color: #000; cursor: pointer; margin-bottom: 0px; transition: 0.3s;" onmouseover="this.style.transform='translateX(-5px)'" onmouseout="this.style.transform='translateX(0)'">
                    <i data-lucide="arrow-left" style="width: 24px;"></i>
                </div>
            </div>
            
            <header style="margin-bottom: 48px; text-align: center;">
                <h2 style="font-size: 32px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px;">Sociedade</h2>
                <p style="color: #999; font-weight: 700; font-size: 13px; margin-bottom: 24px;">Junte-se a outras pessoas.</p>
                <button class="clickable" style="height: 48px; padding: 0 32px; border-radius: 50px; font-size: 11px; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; margin: 0 auto; display: block; background: #fff; border: 2px solid #000; color: #000; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
                    Criar Sociedade
                </button>
            </header>

            <div style="display: flex; gap: 20px; align-items: center; justify-content: center; margin-bottom: 48px; width: 100%; max-width: 400px; margin-left: auto; margin-right: auto;">
                <!-- Proporção 1:1 com Coesão -->
                <div style="flex: 1; display: flex; justify-content: flex-end;">
                    <div style="background: #000; color: #fff; height: 74px; width: 160px; border-radius: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
                        <p style="font-size: 9px; font-weight: 800; text-transform: uppercase; opacity: 0.6; margin-bottom: 2px; letter-spacing: 1px;">Contribuição</p>
                        <p style="font-size: 20px; font-weight: 900;">142</p>
                    </div>
                </div>
                
                <div style="flex: 1; display: flex; justify-content: flex-start;">
                    <button class="clickable" style="background: #f5f5f5; height: 74px; width: 74px; border-radius: 50%; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
                        <i data-lucide="hand-coins" style="width: 20px; color: #000;"></i>
                        <p style="font-size: 7px; font-weight: 900; text-transform: uppercase; color: #000; letter-spacing: 0px;">CONTRIBUIR</p>
                    </button>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 20px;" id="society-list">
                <!-- Injetado via JS -->
            </div>
        </div>
    </template>

    <!-- Outros Templates -->
    <template id="template-mercado">
        <div style="padding: 24px; padding-bottom: 120px;">
            <div onclick="app.navigate('dashboard')" style="display: flex; align-items: center; color: #000; cursor: pointer; margin-bottom: 24px;">
                <i data-lucide="arrow-left" style="width: 24px;"></i>
            </div>
            <header style="margin-bottom: 32px; text-align: center;">
               <h2 style="font-size: 32px; font-weight: 900; letter-spacing: -1.5px;">Mercado Dito 🛍️</h2>
               <p style="font-size: 12px; font-weight: 800; color: #ccc; text-transform: uppercase; letter-spacing: 1px;">Encontre os melhores conteúdos</p>
            </header>
            
            <div style="margin-bottom: 32px; display: flex; gap: 12px;">
                <div style="position: relative; flex: 1;">
                    <i data-lucide="search" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 18px; color: #ccc;"></i>
                    <input type="text" id="market-search" placeholder="Pesquisar..." oninput="app.filterMarket()" style="width: 100%; padding: 16px 16px 16px 48px; background: #f5f5f5; border: none; border-radius: 20px; font-weight: 800; font-size: 13px;">
                </div>
                <button class="clickable" style="width: 50px; height: 50px; background: #000; color: #fff; border-radius: 18px; display: flex; align-items: center; justify-content: center;">
                    <i data-lucide="sliders-horizontal" style="width: 20px;"></i>
                </button>
            </div>

            <div id="store-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <!-- Produtos Injetados via JS -->
            </div>
        </div>
    </template>
    
    <template id="template-hall">
        <div style="padding: 24px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <div onclick="app.navigate('dashboard')" class="clickable">
                    <i data-lucide="arrow-left" style="width: 32px;"></i>
                </div>
                <div style="background: #000; color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">
                    Hall da Fama
                </div>
            </div>

            <!-- Podium -->
            <div style="display: flex; gap: 32px; margin-bottom: 60px; align-items: stretch; justify-content: center;">
                <!-- 1st Place (Naked) -->
                <div style="flex: 1.2; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;">
                    <span style="font-size: 11px; font-weight: 900; color: #ccac00; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px;">1º Lugar</span>
                    <div id="hall-1st-avatar" style="width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border: 4px solid #f5f5f5; box-shadow: 0 20px 40px rgba(0,0,0,0.05);"></div>
                    <h3 id="hall-1st-name" style="font-size: 24px; font-weight: 900; italic; margin-bottom: 4px; color: #000;"></h3>
                    <p id="hall-1st-sales" style="font-size: 28px; font-weight: 900; color: #000; letter-spacing: -1px;"></p>
                </div>

                <!-- 2nd-10th List (Naked Side) -->
                <div style="flex: 1; display: flex; flex-direction: column; gap: 4px; justify-content: center;" id="hall-top-others">
                    <!-- Injetado via JS -->
                </div>
            </div>
        </div>
    </template>

    <template id="template-produtos">
        <div style="padding: 24px; padding-bottom: 120px;">
            <div onclick="app.navigate('dashboard')" style="display: flex; align-items: center; color: #000; cursor: pointer; margin-bottom: 24px;">
                <i data-lucide="arrow-left" style="width: 24px;"></i>
            </div>
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
                <h2 style="font-size: 24px; font-weight: 900;">Meus Produtos</h2>
                <button onclick="app.navigate('criar-produto')" style="background: #000; color: #fff; padding: 10px 20px; border-radius: 12px; font-size: 11px; font-weight: 900; text-transform: uppercase;">Novo</button>
            </header>

            <div id="my-products-list" style="display: flex; flex-direction: column; gap: 16px;">
                <!-- Seus produtos injetados aqui -->
            </div>
        </div>
    </template>
    
    <template id="template-links">
        <div style="padding: 24px;">
            <div onclick="app.navigate('dashboard')" style="display: flex; align-items: center; color: #000; cursor: pointer; margin-bottom: 24px; transition: 0.3s;" onmouseover="this.style.transform='translateX(-5px)'" onmouseout="this.style.transform='translateX(0)'">
                <i data-lucide="arrow-left" style="width: 24px;"></i>
            </div>
            <div style="padding: 40px 24px; text-align: center;">
            <i data-lucide="link" style="width: 48px; color: #eee; margin-bottom: 20px;"></i>
            <h2 style="font-weight: 900; text-transform: lowercase;">links de venda</h2>
        </div>
    </template>
    
    <template id="template-sacar">
        <div style="padding: 24px;">
            <div onclick="app.navigate('dashboard')" style="display: flex; align-items: center; color: #000; cursor: pointer; margin-bottom: 32px;">
                <i data-lucide="arrow-left" style="width: 24px;"></i>
            </div>
            
            <section style="background: #000; color: #fff; padding: 40px; border-radius: 35px; text-align: center; margin-bottom: 32px;">
                <p style="font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; margin-bottom: 12px;">Saldo Disponível</p>
                <div id="withdraw-balance" style="font-size: 42px; font-weight: 900;">R$ 0,00</div>
            </section>

            <div style="background: #fafafa; padding: 32px; border-radius: 30px; border: 1px solid #eee;">
                <label style="display: block; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #999; margin-bottom: 16px;">Valor do Saque</label>
                <input type="number" id="withdraw-amount" placeholder="0.00" style="width: 100%; padding: 20px; background: #fff; border: 1px solid #eee; border-radius: 16px; font-size: 24px; font-weight: 900; outline: none; margin-bottom: 24px;">
                
                <button onclick="app.handleWithdraw()" style="width: 100%; height: 64px; background: #000; color: #fff; border-radius: 20px; font-weight: 900; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">Solicitar Saque</button>
            </div>
        </div>
    </template>
    
    <template id="template-hall">
        <div style="padding: 24px; padding-bottom: 120px;">
            <header style="text-align: center; margin-bottom: 40px;">
                <div onclick="app.navigate('dashboard')" style="position: absolute; left: 24px; top: 32px; cursor: pointer;">
                    <i data-lucide="arrow-left" style="width: 24px;"></i>
                </div>
                <div style="background: #000; color: #fff; padding: 8px 20px; border-radius: 50px; display: inline-flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;">
                    <i data-lucide="timer" style="width: 14px;"></i>
                    Reseta em 24 dias
                </div>
                <h2 style="font-size: 32px; font-weight: 900; margin-top: 20px;">hall da fama 🏆</h2>
            </header>

            <div style="text-align: center; margin-bottom: 60px;">
                <div style="position: relative; display: inline-block;">
                    <div style="width: 140px; height: 140px; background: #000; color: #fff; border-radius: 40px; display: flex; align-items: center; justify-content: center; font-size: 60px; box-shadow: 0 30px 60px rgba(0,0,0,0.15);">
                        🤴
                    </div>
                </div>
                <h3 style="margin-top: 24px; font-size: 24px; font-weight: 900;">Lucas Silva</h3>
                <div style="font-size: 28px; font-weight: 900; color: #000; margin-top: 8px;">R$ 145.200</div>
            </div>
        </div>
    </template>

    <template id="template-criar-produto">
        <div style="padding: 24px;">
            <div onclick="app.navigate('dashboard')" style="display: flex; align-items: center; color: #000; cursor: pointer; margin-bottom: 32px; transition: 0.3s;" onmouseover="this.style.transform='translateX(-5px)'" onmouseout="this.style.transform='translateX(0)'">
                <i data-lucide="arrow-left" style="width: 24px;"></i>
            </div>

            <header style="text-align: center; margin-bottom: 40px;">
                <h3 style="font-size: 32px; font-weight: 900; letter-spacing: -1px;">Criar produto</h3>
            </header>
            
            <div style="display: flex; justify-content: center; gap: 32px; margin-bottom: 48px;" id="product-type-selection">
                <div style="text-align: center;">
                    <button onclick="app.selectProductType('Ebook', this)" style="width: 84px; height: 84px; background: #f5f5f5; border: 2px solid transparent; border-radius: 50%; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.05);">
                        <i data-lucide="book-open" style="width: 28px;"></i>
                    </button>
                    <span style="font-size: 11px; font-weight: 900; text-transform: uppercase; color: #666;">Ebook</span>
                </div>
                <div style="text-align: center;">
                    <button onclick="app.selectProductType('Curso', this)" style="width: 84px; height: 84px; background: #f5f5f5; border: 2px solid transparent; border-radius: 50%; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.05);">
                        <i data-lucide="play-circle" style="width: 28px;"></i>
                    </button>
                    <span style="font-size: 11px; font-weight: 900; text-transform: uppercase; color: #666;">Curso</span>
                </div>
                <div style="text-align: center;">
                    <button onclick="app.selectProductType('Mentoria', this)" style="width: 84px; height: 84px; background: #f5f5f5; border: 2px solid transparent; border-radius: 50%; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.05);">
                        <i data-lucide="users" style="width: 28px;"></i>
                    </button>
                    <span style="font-size: 11px; font-weight: 900; text-transform: uppercase; color: #666;">Mentoria</span>
                </div>
            </div>

            <div id="create-product-form" style="display: none; flex-direction: column; gap: 20px; max-width: 450px; margin: 0 auto;">
                <div>
                    <label style="display: block; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #999; margin-bottom: 10px; margin-left: 12px;">Nome do Produto</label>
                    <input type="text" id="prod-name" placeholder="Ex: Do Zero ao Pro" style="width: 100%; padding: 20px 24px; background: #fafafa; border: 1px solid #eee; border-radius: 20px; font-weight: 800; font-size: 14px; outline: none; transition: 0.3s;">
                </div>

                <div style="display: flex; align-items: center; justify-content: space-between; background: #fafafa; padding: 20px; border-radius: 20px; border: 1px solid #eee;">
                    <div>
                        <p style="font-weight: 900; font-size: 13px;">Mostrar no mercado</p>
                        <p style="font-size: 10px; color: #999; font-weight: 700;">Seu produto será visível para todos</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="prod-visible" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
                
                <!-- Campos Condicionais de Upload/Link -->
                <div id="ebook-upload" style="display: none;">
                    <label style="display: block; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #999; margin-bottom: 10px; margin-left: 12px;">Upload do Ebook (PDF)</label>
                    <div style="position: relative; width: 100%; padding: 20px; border: 2px dashed #eee; border-radius: 20px; text-align: center; background: #fafafa;">
                        <i data-lucide="upload-cloud" style="width: 24px; color: #ccc; margin-bottom: 8px;"></i>
                        <p style="font-size: 11px; font-weight: 800; color: #999;">Arraste ou clique para enviar PDF</p>
                        <input type="file" accept=".pdf" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
                    </div>
                </div>

                <div id="curso-upload" style="display: none;">
                    <label style="display: block; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #999; margin-bottom: 10px; margin-left: 12px;">Upload das Aulas (Vídeos)</label>
                    <div style="position: relative; width: 100%; padding: 20px; border: 2px dashed #eee; border-radius: 20px; text-align: center; background: #fafafa;">
                        <i data-lucide="upload-cloud" style="width: 24px; color: #ccc; margin-bottom: 8px;"></i>
                        <p style="font-size: 11px; font-weight: 800; color: #999;">Arraste ou clique para enviar vídeos</p>
                        <input type="file" multiple accept="video/*" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
                    </div>
                </div>

                <div id="mentoria-link" style="display: none;">
                    <label style="display: block; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #999; margin-bottom: 10px; margin-left: 12px;">Link da Mentoria (Zoom, Meet, etc)</label>
                    <input type="url" id="prod-link" placeholder="https://..." style="width: 100%; padding: 20px 24px; background: #fafafa; border: 1px solid #eee; border-radius: 20px; font-weight: 800; font-size: 14px; outline: none;">
                </div>

                <div>
                    <label style="display: block; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #999; margin-bottom: 10px; margin-left: 12px;">Preço Sugerido</label>
                    <input type="number" id="prod-price" placeholder="0.00" style="width: 100%; padding: 20px 24px; background: #fafafa; border: 1px solid #eee; border-radius: 20px; font-weight: 800; font-size: 16px; outline: none;">
                </div>
                <div id="mentoria-fields" style="display: none;">
                    <label style="display: block; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #999; margin-bottom: 10px; margin-left: 12px;">Data de Início da Mentoria</label>
                    <input type="date" id="prod-date" style="width: 100%; padding: 20px 24px; background: #fafafa; border: 1px solid #eee; border-radius: 20px; font-weight: 800; font-size: 14px; outline: none;">
                </div>

                <div style="display: flex; gap: 16px; margin-top: 20px;">
                    <button onclick="app.navigate('dashboard')" style="flex: 1; padding: 20px; background: #fff; border: 1px solid #eee; border-radius: 20px; font-weight: 900; font-size: 12px; text-transform: uppercase; cursor: pointer;">Cancelar</button>
                    <button onclick="app.saveProduct()" style="flex: 2; padding: 20px; background: #000; color: #fff; border: none; border-radius: 20px; font-weight: 900; font-size: 12px; text-transform: uppercase; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">Finalizar Cadastro</button>
                </div>
            </div>
        </div>
    </template>

    <template id="template-checkout">
        <div style="padding: 24px; padding-bottom: 120px;">
            <div onclick="app.navigate('mercado')" style="display: flex; align-items: center; color: #000; cursor: pointer; margin-bottom: 32px;">
                <i data-lucide="arrow-left" style="width: 24px;"></i>
            </div>

            <div style="max-width: 450px; margin: 0 auto;">
                <div id="checkout-product-img" style="width: 100%; aspect-ratio: 1; background: #f5f5f5; border-radius: 35px; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #eee;">
                    <!-- Imagem injetada via JS -->
                </div>

                <div style="text-align: center; margin-bottom: 32px;">
                    <h2 id="checkout-product-name" style="font-size: 28px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px;">Nome do Produto</h2>
                    <p id="checkout-product-desc" style="color: #999; font-weight: 700; font-size: 13px; line-height: 1.6;">Descrição detalhada do produto aqui.</p>
                </div>

                <div style="background: #fafafa; padding: 24px; border-radius: 30px; border: 1px solid #eee; margin-bottom: 32px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #eee; padding-bottom: 16px; margin-bottom: 16px;">
                        <span style="font-weight: 800; color: #999;">Preço total</span>
                        <span id="checkout-product-price" style="font-size: 24px; font-weight: 900; color: #000;">R$ 0,00</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px; color: #22c55e;">
                        <i data-lucide="shield-check" style="width: 16px;"></i>
                        <span style="font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">Pagamento Seguro via Dito</span>
                    </div>
                </div>

                <button onclick="app.processCheckout()" style="width: 100%; height: 74px; background: #22c55e; color: #fff; border: none; border-radius: 25px; font-size: 18px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 15px 35px rgba(34, 197, 94, 0.2); cursor: pointer;">
                    Comprar Agora
                </button>
            </div>
        </div>
    </template>
    <template id="template-perfil">
        <div style="padding-bottom: 120px;">
            <!-- Header do Perfil -->
            <header style="padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f5f5f5; position: sticky; top: 0; background: #fff; z-index: 100;">
                <h3 id="profile-username-header" style="font-weight: 900; font-size: 18px; letter-spacing: -1px;">benedito_pro</h3>
                <div style="display: flex; gap: 20px;">
                    <i data-lucide="plus" style="width: 28px; cursor: pointer; stroke-width: 2px;" onclick="document.getElementById('post-upload').click()"></i>
                    <i data-lucide="menu" style="width: 24px;"></i>
                </div>
                <input type="file" id="post-upload" style="display: none;" accept="image/*" onchange="app.handleNewPost(event)">
            </header>

            <!-- Info de Elite -->
            <div style="padding: 24px;">
                <div style="display: flex; align-items: center; gap: 32px; margin-bottom: 24px;">
                    <div style="position: relative;">
                        <!-- Foto de Perfil Limpa -->
                        <div style="width: 86px; height: 86px; border-radius: 50%; background: #f5f5f5; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #eee;" onclick="document.getElementById('avatar-upload').click()">
                            <div id="profile-avatar-container" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
                                <i data-lucide="user" style="color: #ccc; width: 40px;"></i>
                            </div>
                        </div>
                        <input type="file" id="avatar-upload" style="display: none;" accept="image/*" onchange="app.handleAvatarUpload(event)">
                    </div>
                    <div style="display: flex; flex: 1; justify-content: space-around; text-align: center; gap: 10px;">
                        <div>
                            <p id="count-posts" style="font-weight: 900; font-size: 16px; letter-spacing: -0.5px;">0</p>
                            <p style="font-size: 9px; font-weight: 800; color: #ccc; text-transform: uppercase;">Posts</p>
                        </div>
                        <div>
                            <p id="count-fans" style="font-weight: 900; font-size: 16px; letter-spacing: -0.5px;">0</p>
                            <p style="font-size: 9px; font-weight: 800; color: #ccc; text-transform: uppercase;">Fãs</p>
                        </div>
                        <div>
                            <p id="count-friends" style="font-weight: 900; font-size: 16px; letter-spacing: -0.5px;">0</p>
                            <p style="font-size: 9px; font-weight: 800; color: #ccc; text-transform: uppercase;">Amigos</p>
                        </div>
                    </div>
                </div>

                <!-- Bio -->
                <div style="margin-bottom: 32px;">
                    <h4 id="profile-name" style="font-weight: 900; font-size: 16px; margin-bottom: 4px; letter-spacing: -0.5px;">Benedito Santos</h4>
                    <p id="profile-bio" style="font-size: 13px; font-weight: 700; color: #666; line-height: 1.5; margin-bottom: 8px;">Infoprodutor de Elite | Especialista em SaaS 🚀</p>
                    <a id="profile-link" href="#" style="color: #000; font-size: 13px; font-weight: 900; text-decoration: none; display: flex; align-items: center; gap: 6px;">
                        <i data-lucide="link" style="width: 14px;"></i>
                        dito.com/sua-loja
                    </a>
                </div>

                <!-- Botões Estilo Cápsula -->
                <div style="display: flex; gap: 12px; margin-bottom: 32px;">
                    <button onclick="app.navigate('editar-perfil')" class="clickable" style="flex: 1; height: 50px; background: #f5f5f5; border: none; border-radius: 50px; font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;">Editar Perfil</button>
                    <button class="clickable" style="flex: 1; height: 50px; background: #f5f5f5; border: none; border-radius: 50px; font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;">Compartilhar</button>
                </div>

                <!-- Botão Admin (Aparece apenas para o Benedito) -->
                <div id="admin-only-section" style="display: none; margin-bottom: 32px;">
                    <button onclick="app.navigate('admin-contas')" style="width: 100%; height: 50px; background: #000; color: #fff; border: none; border-radius: 15px; font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
                        <i data-lucide="shield-check" style="width: 18px;"></i>
                        Gerenciar Contas (Admin)
                    </button>
                </div>
            </div>

            <!-- Tabs Feed -->
            <div style="display: flex; border-top: 1px solid #efefef;">
                <div style="flex: 1; display: flex; justify-content: center; padding: 12px; border-top: 2px solid #000;">
                    <i data-lucide="grid" style="width: 22px;"></i>
                </div>
                <!-- ... resto das tabs ... -->
            </div>

            <!-- Feed Mosaic -->
            <div id="profile-posts-grid" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px;">
                <!-- Posts injetados aqui -->
            </div>
        </div>
    </template>

    <template id="template-admin-contas">
        <div style="padding: 24px; padding-bottom: 120px;">
            <header style="display: flex; align-items: center; gap: 16px; margin-bottom: 32px;">
                <div onclick="app.navigate('perfil')" style="width: 40px; height: 40px; background: #f5f5f5; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                    <i data-lucide="arrow-left" style="width: 20px;"></i>
                </div>
                <h2 style="font-weight: 900; font-size: 20px;">Gestão de Contas</h2>
            </header>

            <div id="admin-users-list" style="display: flex; flex-direction: column; gap: 16px;">
                <!-- Lista de usuários carregada via JS -->
            </div>
        </div>
    </template>

    <template id="template-editar-perfil">
        <div style="padding: 24px; padding-bottom: 120px;">
            <header style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px;">
                <div onclick="app.navigate('perfil')" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                    <i data-lucide="x" style="width: 24px;"></i>
                </div>
                <h3 style="font-weight: 900; font-size: 16px;">Editar Perfil</h3>
                <div id="save-profile-btn" onclick="app.saveProfile()" style="color: #0095f6; font-weight: 900; font-size: 14px; cursor: pointer;">Salvar</div>
            </header>

            <div style="display: flex; flex-direction: column; gap: 32px;">
                <div style="border-bottom: 1px solid #eee; padding-bottom: 12px;">
                    <label style="display: block; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #ccc; margin-bottom: 8px;">Nome de Usuário (max 18)</label>
                    <input type="text" id="edit-username" maxlength="18" placeholder="username" style="width: 100%; border: none; background: transparent; font-weight: 800; font-size: 16px; outline: none; padding: 0;">
                </div>
                
                <div style="border-bottom: 1px solid #eee; padding-bottom: 12px;">
                    <label style="display: block; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #ccc; margin-bottom: 8px;">Biografia (max 300)</label>
                    <textarea id="edit-bio" maxlength="300" placeholder="Conte sua história..." style="width: 100%; border: none; background: transparent; font-weight: 800; font-size: 15px; outline: none; padding: 0; min-height: 100px; font-family: inherit; resize: none;"></textarea>
                    <p id="bio-counter" style="text-align: right; font-size: 10px; color: #ccc; margin-top: 4px; font-weight: 800;">0 / 300</p>
                </div>

                <div style="border-bottom: 1px solid #eee; padding-bottom: 12px;">
                    <label style="display: block; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #ccc; margin-bottom: 8px;">Link do seu site</label>
                    <input type="url" id="edit-link" placeholder="https://..." style="width: 100%; border: none; background: transparent; font-weight: 800; font-size: 15px; outline: none; padding: 0; color: #00376b;">
                </div>
            </div>
        </div>
    </template>

    <div id="modal-container" class="modal-overlay" onclick="app.closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
